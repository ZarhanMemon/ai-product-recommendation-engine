<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h3>👥 Users Purchase Data</h3>

        <table class="table table-bordered">

            <tr>
                <th>User</th>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Date</th>
            </tr>

            {% for u in users %}

            <tr>
                <td>{{ u.customer_id }}</td>
                <td>{{ u.product_name }}</td>
                <td>{{ u.product_category }}</td>
                <td>{{ u.price_usd }}</td>
                <td>{{ u.order_date }}</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
