<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Recommended Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
        }

        .product-card {
            transition: 0.3s;
            border: none;
        }

        .product-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .product-img {
            height: 180px;
            object-fit: contain;
            padding: 10px;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="/" class="navbar-brand">🛒 SmartShop</a>
        </div>
    </nav>

    <div class="container mt-4">

        <h3> Recommended for You</h3>

        <div class="row">

            {% for item in recommended %}

            <div class="col-md-3 mb-4">

                <div class="card product-card">

                    <img src="{{ item.image_url }}" class="product-img">

                    <div class="card-body text-center">

                        <h6>{{ item.product_name }}</h6>
                        <p class="text-muted small">{{ item.product_category }}</p>
                         <h5>
                            <span class="text-muted"><s>$ {{ item.price }}</s></span>
                            $ {{ item.discount_price }}
                        </h5>

                        <button class="btn btn-sm btn-dark">View</button>

                    </div>
                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
